name: Main Branch Signin Suite

on:
  push:
    branches:
      - main

jobs:
  signin-suite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Signin Suite
        run: mvn clean test -Dsurefire.suiteXmlFiles=signin_test_suite.xml