# ==================== ENVIRONMENT ====================
environment=qa
appURL=https://beta.logixerp.com/Login?c=TMS
appURL.qa=https://beta.logixerp.com/Login?c=TMS
appURL.uat=https://alpha.logixerp.com/Login?c=TMS
appURL.dev=https://dev.logixerp.com/Login?c=TMS

# ==================== EXECUTION ====================
execution_env=local
browser=chrome
headless=false
chromeBinary=
implicit_wait=10
explicit_wait=20
page_load_timeout=60
script_timeout=30

# ==================== CREDENTIALS ====================
username=admin
password=logixerp
admin.username=admin
admin.password=logixerp
wms.user=admin
wms.password=logixerp
picker.user=admin
picker.password=logixerp

# ==================== REMOTE / CLOUD ====================
gridHubURL=http://localhost:4444/wd/hub
fallbackToLocal=true
video.recording.enabled=false

# ==================== RETRY ====================
retry.failed.tests=true
retry.count=2
locator.autoheal=true

# ==================== API ====================
api.enabled=true
api.baseURL=https://beta.logixerp.com/api
api.baseURL.qa=https://beta.logixerp.com/api

# ==================== DATABASE ====================
db.enabled=false
db.url=jdbc:mysql://localhost:3306/logixerp_wms
db.username=automation_user
db.password=change_me

# ==================== REPORTING ====================
extent.report.title=LogixERP WMS Automation
